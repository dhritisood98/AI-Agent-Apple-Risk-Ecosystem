name: Daily Apple Risk Scrape

on:
  schedule:
    # 13:00 UTC is 8:00 AM CST (Chicago time)
    - cron: '15 19 * * *'
  workflow_dispatch: 

# Fixes Exit Code 128 by allowing the bot to write to the repo
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ui-initial-draft

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install supabase requests beautifulsoup4 
          # Add any other libraries your script needs here

      - name: Run Sync Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_to_supabase.py

      - name: Commit and Push changes
        run: |
          # Setup the git bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add files (Change 'data.json' to whatever file your script creates/updates)
          git add . 
          
          # Only commit if there are actually changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Apple Risk Scrape update" && git push origin ui-initial-draft)
